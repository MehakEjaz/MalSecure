<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MalSecure</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.jpeg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
  <div class="bg-glow bg-glow-a"></div>
  <div class="bg-glow bg-glow-b"></div>
  <div class="bg-grid"></div>
<header class="topbar">
  <div class="topbar-inner">
    <a href="{{ url_for('index') }}" class="brand" style="text-decoration: none; display: inline-flex; align-items: center;">
      
      <span class="brand-logo" style="display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; overflow: hidden; border-radius: 8px; margin-right: 12px; box-shadow: 0 0 12px rgba(91, 141, 217, 0.25);">
        <img src="{{ url_for('static', filename='logo.PNG') }}" 
             alt="MalSecure Logo" 
             style="width: 100%; height: 100%; object-fit: cover;">
      </span>
      
      <div style="display: flex; flex-direction: column; line-height: 1.15;">
        <span style="
          font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
          font-size: 21px;
          letter-spacing: -0.2px;
          display: inline-block;
        ">
          <strong style="font-weight: 800; color: #ffffff;">Mal</strong><span style="
            font-weight: 400; 
            background: linear-gradient(180deg, #ffffff 20%, #76a3e6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
          ">Secure</span>
        </span>
        
        <span style="
          font-family: 'Courier New', Courier, monospace;
          font-size: 9px;
          text-transform: uppercase;
          letter-spacing: 2.2px;
          color: #5b8dd9;
          font-weight: 700;
          opacity: 0.85;
          margin-top: 2px;
        ">ANALYSIS-TOOLKIT</span>
      </div>

    </a>
    
    <nav class="topnav">
      <a href="{{ url_for('index') }}">Dashboard</a>
      <a href="{{ url_for('jobs_dashboard') }}">Queue</a>
    </nav>
  </div>
</header>

  <main class="shell">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <section class="stack">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </section>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <div id="loading-overlay" class="overlay" hidden>
    <div class="overlay-card">
      <div class="spinner"></div>
      <p>Analysis in progress...</p>
    </div>
  </div>
</body>
</html>
